<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sand Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#eef2f7;
    padding:15px;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.title{
    text-align:center;
    color:#1565c0;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:14px;
    margin-bottom:6px;
    font-weight:600;
    color:#444;
}

input{
    width:100%;
    height:48px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 12px;
    font-size:16px;
}

button{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    margin-top:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.btn{
    background:#1565c0;
    color:white;
}

.btn:hover{
    opacity:.9;
}

.btn-reset{
    background:#ef5350;
    color:white;
}

.result{
    background:#f7faff;
    border:1px solid #dbe8ff;
    border-radius:12px;
    padding:15px;
    margin-top:12px;
    text-align:center;
}

.result-title{
    color:#666;
    margin-bottom:5px;
}

.result-value{
    font-size:26px;
    font-weight:bold;
    color:#1565c0;
}

.report{
    margin-top:20px;
    border-top:2px dashed #ddd;
    padding-top:15px;
}

.report h3{
    margin-bottom:10px;
    color:#333;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #f0f0f0;
}

.row span:last-child{
    font-weight:bold;
}

.green{
    color:#2e7d32;
}

.red{
    color:#d32f2f;
}

.note{
    font-size:12px;
    color:#888;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title">Sand Calculator</div>

<label>ยอดผลิต</label>
<input type="number" id="production">

<label>Mix Design C1 CU.M</label>
<input type="number" id="mixCUM">

<label>Mix Design C1 CDE</label>
<input type="number" id="mixCDE">

<button class="btn" onclick="calculateMix()">
คำนวณ Mix Total
</button>

<div class="result">
<div class="result-title">Mix Design C1</div>
<div class="result-value" id="mixTotal">0.000</div>
</div>

<button class="btn" onclick="calculateHalf()">
คำนวณ 50/50
</button>

<div class="result">
<div class="result-title">50/50</div>
<div class="result-value" id="half">0.000</div>
</div>

<label>Sand Sub</label>
<input type="number" id="sandSub">

<label>Sand Concrete CDE</label>
<input type="number" id="sandCDE">

<button class="btn" onclick="calculateReport()">
คำนวณรายงาน
</button>

<button class="btn-reset" onclick="resetData()">
Reset
</button>

<div class="report">

<h3>สรุปรายงานรายวัน</h3>

<div class="row">
<span>Mix Total</span>
<span id="reportMix">0.000</span>
</div>

<div class="row">
<span>Sub Total</span>
<span id="reportSub">0.000</span>
</div>

<div class="row">
<span>Adj Manual</span>
<span id="reportAdj">0.000</span>
</div>

<div class="note">
(Mix Design C1 CDE - 50/50)
</div>

<div class="row">
<span>CDE Total</span>
<span id="reportCDE">0.000</span>
</div>

<div class="row">
<span>50/50</span>
<span id="reportHalf">0.000</span>
</div>

<div class="row">
<span>ผลต่าง</span>
<span id="reportDiff">0.000</span>
</div>

</div>

</div>

</div>

<script>

const inputs = document.querySelectorAll("input");

inputs.forEach(input=>{
    input.addEventListener("input",saveData);
});

function saveData(){
    const data = {
        production: production.value,
        mixCUM: mixCUM.value,
        mixCDE: mixCDE.value,
        sandSub: sandSub.value,
        sandCDE: sandCDE.value
    };

    localStorage.setItem("sandCalculator",JSON.stringify(data));
}

function loadData(){

    const data =
    JSON.parse(localStorage.getItem("sandCalculator"));

    if(!data) return;

    production.value = data.production || "";
    mixCUM.value = data.mixCUM || "";
    mixCDE.value = data.mixCDE || "";
    sandSub.value = data.sandSub || "";
    sandCDE.value = data.sandCDE || "";

    calculateReport();
}

function num(id){
    return parseFloat(
        document.getElementById(id).value
    ) || 0;
}

function calculateMix(){

    const mixTotal =
        num("mixCUM") + num("mixCDE");

    document.getElementById("mixTotal")
    .innerText = mixTotal.toFixed(3);
}

function calculateHalf(){

    const mixTotal =
        num("mixCUM") + num("mixCDE");

    const half = mixTotal / 2;

    document.getElementById("half")
    .innerText = half.toFixed(3);
}

function calculateReport(){

    const mixCUM = num("mixCUM");
    const mixCDE = num("mixCDE");
    const sandSub = num("sandSub");
    const sandCDE = num("sandCDE");

    const mixTotal = mixCUM + mixCDE;

    const half = mixTotal / 2;

    const adjManual =
        mixCDE - half;

    const diff =
        sandSub - half;

    document.getElementById("mixTotal")
    .innerText = mixTotal.toFixed(3);

    document.getElementById("half")
    .innerText = half.toFixed(3);

    document.getElementById("reportMix")
    .innerText = mixTotal.toFixed(3);

    document.getElementById("reportSub")
    .innerText = sandSub.toFixed(3);

    document.getElementById("reportAdj")
    .innerText = adjManual.toFixed(3);

    document.getElementById("reportCDE")
    .innerText = sandCDE.toFixed(3);

    document.getElementById("reportHalf")
    .innerText = half.toFixed(3);

    const diffEl =
    document.getElementById("reportDiff");

    diffEl.innerText = diff.toFixed(3);

    if(diff >= 0){
        diffEl.className = "green";
    }else{
        diffEl.className = "red";
    }

    saveData();
}

function resetData(){

    if(confirm("ล้างข้อมูลทั้งหมด?")){

        localStorage.removeItem(
            "sandCalculator"
        );

        location.reload();
    }
}

loadData();

</script>

</body>
</html>
